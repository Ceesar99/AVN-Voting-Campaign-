<html lang="en">
<head>

<title>Nominee Photo Uploader</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f4f2;
    color: #1a1a1a;
    padding: 24px 16px 80px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { color: #6b6b6b; font-size: 14px; margin: 0 0 24px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px;
    max-width: 900px;
  }
  .card {
    background: #fff;
    border: 1px solid #e2e0db;
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .thumb {
    width: 100%;
    aspect-ratio: 4/5;
    background: #eee;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 12px;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .name { font-weight: 600; font-size: 13px; margin-bottom: 8px; }
  input[type="file"] { font-size: 11px; width: 100%; }
  .bar {
    max-width: 900px;
    margin-top: 28px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  button {
    background: #c9a227;
    color: #1a1a1a;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { background: #ddd; color: #999; cursor: not-allowed; }
  #status { font-size: 13px; color: #6b6b6b; }
</style>
</head>

<script>
const NOMINEES = ['Riley Reid', 'Shilpa Sethi', 'Kira Noir', 'Whitney Wright', 'Little Caprice'];
const state = {};
const grid = document.getElementById('grid');

NOMINEES.forEach((name) => {
  state[name] = null;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="thumb" id="thumb-${name}">No photo</div>
    <div class="name">${name}</div>
    <input type="file" accept="image/*" id="input-${name}">
  `;
  grid.appendChild(card);

  const input = card.querySelector('input');
  input.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      state[name] = ev.target.result;
      document.getElementById(`thumb-${name}`).innerHTML = `<img src="${ev.target.result}">`;
    };
    reader.readAsDataURL(file);
  });
});

document.getElementById('generateBtn').addEventListener('click', () => {
  const statusEl = document.getElementById('status');

  const b64 = document.getElementById('template-b64').textContent;
  // decode base64 -> UTF-8 string safely
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  let html = new TextDecoder('utf-8').decode(bytes);

  let count = 0;
  NOMINEES.forEach((name) => {
    if (state[name]) {
      const re = new RegExp('(alt="' + name + '"\\s+src=")[^"]*(")');
      if (re.test(html)) {
        html = html.replace(re, '$1' + state[name] + '$2');
        count++;
      }
    }
  });

  if (count === 0) {
    statusEl.textContent = 'Upload at least one photo first.';
    return;
  }

  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Votingpage.html';
  a.click();
  URL.revokeObjectURL(url);

  statusEl.textContent = `Done. Replaced ${count} photo(s). Check your downloads.`;
});
</script>
